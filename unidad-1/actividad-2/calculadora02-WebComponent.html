<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="utf-8" />
	<title>Calculadora Web Component</title>
</head>

<style>
	/* ========== ESTILOS ========== */
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}

	body {
		display: flex;
		justify-content: center;
		align-items: center;
		min-height: 100vh;
		background-color: #f0f0f0;
		font-family: Arial, sans-serif;
	}

	/* Estilos para la tabla  */
	mi-calculadora table {
		border-collapse: separate;
		border-spacing: 5px;
		background-color: #e0e0e0;
		padding: 10px;
		border-radius: 10px;
        width: 50%;
        
	}

	mi-calculadora td {
		padding: 3px;
	}

	/* Display */
	mi-calculadora #display {
		width: 100%;
		height: 50px;
		font-size: 30px;
		text-align: right;
		padding: 8px;
		border: 2px solid #999;
		border-radius: 8px;
		background-color: white;
		font-family: Arial, sans-serif;
		font-weight: bold;
		margin-bottom: 5px;
	}

	/* Estilos de botones */
	mi-calculadora button {
		width: 50px;
		height: 50px;
		font-size: 18px;
		font-weight: bold;
		border: none;
		border-radius: 6px;
		cursor: pointer;
		box-shadow: 0 4px 0 rgba(0,0,0,0.2);
		transition: all 0.1s;
		font-family: Arial, sans-serif;
	}

	mi-calculadora button:active {
		transform: translateY(4px);
		box-shadow: 0 0 0 rgba(0,0,0,0.2);
	}

	/* Botones numéricos */
	mi-calculadora .btn-numero {
		background-color: #4a90e2;
		color: white;
	}

	mi-calculadora .btn-numero:hover {
		background-color: #357abd;
	}

	/* Botón punto */
	mi-calculadora .btn-punto {
		background-color: #4a90e2;
		color: white;
	}

	mi-calculadora .btn-punto:hover {
		background-color: #357abd;
	}

	/* Botones de operación*/
	mi-calculadora .btn-operacion {
		background-color: #7ed321;
		color: white;
	}

	mi-calculadora .btn-operacion:hover {
		background-color: #6bb81a;
	}

	/* Botón igual */
	mi-calculadora .btn-resultado {
		background-color: #f5a623;
		color: white;
	}

	mi-calculadora .btn-resultado:hover {
		background-color: #d48e1b;
	}

	/* Botón de borrar */
	mi-calculadora .btn-borrar {
		color: white;
		font-family: Arial;
		font-weight: bold;
		font-size: 16px;
		background-color: #d0021b;
		box-shadow: 0px 4px #BB3E22;
		width: 100%;
		height: 40px;
		border-radius: 6px;
		border-color: #BB3E22;
	}

	mi-calculadora .btn-borrar:hover {
		background-color: #a00115;
	}
</style>

<body>

	<!-- Uso del Web Component -->
	<mi-calculadora></mi-calculadora>

</body>

<script type="text/javascript">

// ========== DEFINICIÓN DEL WEB COMPONENT ==========
class MiCalculadora extends HTMLElement {

	constructor() {
		super(); //  Siempre primero inicializar la clase base

		// Crear y definir todos los miembros del elemento nuevo que queremos componer
		this.display = document.createElement('input');
		this.display.id = 'display';
		this.display.type = 'text';
		this.display.disabled = true;
		this.display.value = '';

		this.table = document.createElement('table');

		// Crear botones numéricos
		this.btn0 = this._crearBoton('0', 'btn-numero');
		this.btn1 = this._crearBoton('1', 'btn-numero');
		this.btn2 = this._crearBoton('2', 'btn-numero');
		this.btn3 = this._crearBoton('3', 'btn-numero');
		this.btn4 = this._crearBoton('4', 'btn-numero');
		this.btn5 = this._crearBoton('5', 'btn-numero');
		this.btn6 = this._crearBoton('6', 'btn-numero');
		this.btn7 = this._crearBoton('7', 'btn-numero');
		this.btn8 = this._crearBoton('8', 'btn-numero');
		this.btn9 = this._crearBoton('9', 'btn-numero');

		// Crear botón punto
		this.btnComa = this._crearBoton('.', 'btn-punto');

		// Crear botones de operación
		this.btnSumar = this._crearBoton('+', 'btn-operacion');
		this.btnRestar = this._crearBoton('-', 'btn-operacion');
		this.btnMultiplicar = this._crearBoton('*', 'btn-operacion');
		this.btnDividir = this._crearBoton('/', 'btn-operacion');

		// Crear botón resultado
		this.btnResultado = this._crearBoton('=', 'btn-resultado');

		// Crear botón borrar
		this.btnBorrar = document.createElement('button');
		this.btnBorrar.id = 'btnBorrar';
		this.btnBorrar.className = 'btn-borrar';
		this.btnBorrar.innerText = 'Borrar';

		// Estructura de la tabla
		this._construirTabla();

		// Agregar tabla al componente
		this.appendChild(this.table);
	}

	// Método auxiliar para crear botones
	_crearBoton(texto, clase) {
		const btn = document.createElement('button');
		btn.innerText = texto;
		btn.className = clase;
		return btn;
	}

	// Método auxiliar para crear celdas de tabla
	_crearTd(elemento) {
		const td = document.createElement('td');
		td.appendChild(elemento);
		return td;
	}

	// Construir la tabla con la estructura de la calculadora
	_construirTabla() {
		// Fila del display
		const trDisplay = document.createElement('tr');
		const tdDisplay = document.createElement('td');
		tdDisplay.colSpan = 4;
		tdDisplay.appendChild(this.display);
		trDisplay.appendChild(tdDisplay);
		this.table.appendChild(trDisplay);

		// Fila 1: 7, 8, 9, +
		const tr1 = document.createElement('tr');
		tr1.appendChild(this._crearTd(this.btn7));
		tr1.appendChild(this._crearTd(this.btn8));
		tr1.appendChild(this._crearTd(this.btn9));
		tr1.appendChild(this._crearTd(this.btnSumar));
		this.table.appendChild(tr1);

		// Fila 2: 4, 5, 6, -
		const tr2 = document.createElement('tr');
		tr2.appendChild(this._crearTd(this.btn4));
		tr2.appendChild(this._crearTd(this.btn5));
		tr2.appendChild(this._crearTd(this.btn6));
		tr2.appendChild(this._crearTd(this.btnRestar));
		this.table.appendChild(tr2);

		// Fila 3: 3, 2, 1, *
		const tr3 = document.createElement('tr');
		tr3.appendChild(this._crearTd(this.btn3));
		tr3.appendChild(this._crearTd(this.btn2));
		tr3.appendChild(this._crearTd(this.btn1));
		tr3.appendChild(this._crearTd(this.btnMultiplicar));
		this.table.appendChild(tr3);

		// Fila 4: 0, ., =, /
		const tr4 = document.createElement('tr');
		tr4.appendChild(this._crearTd(this.btn0));
		tr4.appendChild(this._crearTd(this.btnComa));
		tr4.appendChild(this._crearTd(this.btnResultado));
		tr4.appendChild(this._crearTd(this.btnDividir));
		this.table.appendChild(tr4);

		// Fila 5: Borrar (ocupa toda la fila)
		const trBorrar = document.createElement('tr');
		const tdBorrar = document.createElement('td');
		tdBorrar.colSpan = 4;
		tdBorrar.appendChild(this.btnBorrar);
		trBorrar.appendChild(tdBorrar);
		this.table.appendChild(trBorrar);
	}

	// ========== MANEJADORES DE EVENTOS ==========

	// Números
	onBtn0Click() { this.display.value += '0'; }
	onBtn1Click() { this.display.value += '1'; }
	onBtn2Click() { this.display.value += '2'; }
	onBtn3Click() { this.display.value += '3'; }
	onBtn4Click() { this.display.value += '4'; }
	onBtn5Click() { this.display.value += '5'; }
	onBtn6Click() { this.display.value += '6'; }
	onBtn7Click() { this.display.value += '7'; }
	onBtn8Click() { this.display.value += '8'; }
	onBtn9Click() { this.display.value += '9'; }

	// Punto decimal
	onBtnComaClick() { this.display.value += '.'; }

	// Operaciones
	onBtnSumarClick() { this.display.value += '+'; }
	onBtnRestarClick() { this.display.value += '-'; }
	onBtnMultiplicarClick() { this.display.value += '*'; }
	onBtnDividirClick() { this.display.value += '/'; }

	// Resultado
	onBtnResultadoClick() {
		this.display.value = eval(this.display.value);
	}

	// Borrar
	onBtnBorrarClick() {
		this.display.value = '';
	}

	// ========== CICLO DE VIDA DEL WEB COMPONENT ==========

	connectedCallback() {
		console.log('mi-calculadora agregado al DOM'); //DOM:Modelo de Objetos del Documento

		// Asignar eventos a botones numéricos
		this.btn0.onclick = this.onBtn0Click.bind(this);
		this.btn1.onclick = this.onBtn1Click.bind(this);
		this.btn2.onclick = this.onBtn2Click.bind(this);
		this.btn3.onclick = this.onBtn3Click.bind(this);
		this.btn4.onclick = this.onBtn4Click.bind(this);
		this.btn5.onclick = this.onBtn5Click.bind(this);
		this.btn6.onclick = this.onBtn6Click.bind(this);
		this.btn7.onclick = this.onBtn7Click.bind(this);
		this.btn8.onclick = this.onBtn8Click.bind(this);
		this.btn9.onclick = this.onBtn9Click.bind(this);

		// Asignar evento a botón punto
		this.btnComa.onclick = this.onBtnComaClick.bind(this);

		// Asignar eventos a botones de operación
		this.btnSumar.onclick = this.onBtnSumarClick.bind(this);
		this.btnRestar.onclick = this.onBtnRestarClick.bind(this);
		this.btnMultiplicar.onclick = this.onBtnMultiplicarClick.bind(this);
		this.btnDividir.onclick = this.onBtnDividirClick.bind(this);

		// Asignar evento a botón resultado
		this.btnResultado.onclick = this.onBtnResultadoClick.bind(this);

		// Asignar evento a botón borrar
		this.btnBorrar.onclick = this.onBtnBorrarClick.bind(this);
	}

	disconnectedCallback() {
		console.log('mi-calculadora removido del DOM');
		// Opcional: limpiar eventos si fuera necesario
	}
}

// Registrar el Web Component
customElements.define('mi-calculadora', MiCalculadora);

// ========== FUNCIÓN PRINCIPAL ==========
function main() {
	console.log('Calculadora Web Component inicializada');
}

window.onload = main;

</script>

</html>
