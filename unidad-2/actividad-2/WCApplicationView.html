<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://www.w3schools.com/lib/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./assets/css/admin-styles.css">
</head>
<body>
    <div id="app"></div>
</body>
<script>

// FUNCIONES DE CREACIÓN DE ELEMENTOS

    //Barra superior - header
    function createTopBar() {
        var header = document.createElement('header');
        var logoContainer = document.createElement('div');
        var logoImg = document.createElement('img');
        var logoText = document.createElement('span');
        var sidebarToggleBtn = createSidebarToggleButton();
        var rightButtons = document.createElement('div');
        var emailBtn = createIconButton("fa-envelope-open", "Email");
        var notificationBtn = createIconButton("fa-bell", "Notificaciones");
        var userBtn = createIconButton("fa-user", "Usuario");

        emailBtn.id = "topbar-email-btn";
        notificationBtn.id = "topbar-notification-btn";
        userBtn.id = "topbar-user-btn";

        logoContainer.appendChild(logoImg);
        logoContainer.appendChild(logoText);
        logoContainer.appendChild(sidebarToggleBtn);
        rightButtons.appendChild(emailBtn);
        rightButtons.appendChild(notificationBtn);
        rightButtons.appendChild(userBtn);
        header.appendChild(logoContainer);
        header.appendChild(rightButtons);

        header.classList.add("w3-bar", "w3-white", "w3-card");
        header.style.position = "fixed";
        header.style.width = "100%";
        header.style.height = "54px";
        header.style.zIndex = "1";
        header.style.top = "0";

        logoContainer.classList.add("w3-bar-item", "w3-padding-large");
        logoContainer.style.fontWeight = "bold";
        logoContainer.style.fontSize = "x-large";
        logoContainer.style.color = "#2196F3";

        logoImg.src = "./assets/admin-logo.png";
        logoImg.alt = "W3Admin";
        logoImg.style.width = "26px";
        logoImg.style.marginRight = "10px";
        logoImg.style.verticalAlign = "middle";

        logoText.textContent = "Dashboard";
        logoText.style.verticalAlign = "middle";

        rightButtons.classList.add("w3-bar-item", "w3-right", "w3-padding-small");

        return header;
    }

    // Botón de icono genérico
    function createIconButton(iconClass, title) {
        var button = document.createElement('button');
        var icon = document.createElement('i');

        button.appendChild(icon);

        button.classList.add("w3-bar-item", "w3-button", "w3-large", "w3-hover-text-primary");
        button.title = title;
        button.style.border = "none";
        button.style.background = "none";
        button.style.cursor = "pointer";

        icon.classList.add("fa", iconClass);

        return button;
    }

    // Barra lateral - sidebar
    function createSidebar() {
        var sidebar = document.createElement('nav');
        var navLabel = document.createElement('div');
        var menuItems = [
            { icon: "fa-bar-chart", text: "Dashboard", href: "./index.html", id: "menu-dashboard" },
            { icon: "fa-fire", text: "UI Icons", href: "./icons.html", id: "menu-icons" },
            { icon: "fa-edit", text: "Forms", href: "./forms.html", id: "menu-forms" },
            { icon: "fa-table", text: "Tables", href: "./tables.html", id: "menu-tables" },
            { icon: "fa-user-circle", text: "Profile", href: "./profile.html", id: "menu-profile" },
            { icon: "fa-lock", text: "Login", href: "./login.html", id: "menu-login" },
            { icon: "fa-sign-in", text: "Registration", href: "./register.html", id: "menu-registration" }
        ];
        var menuElements = menuItems.map(function(item) {
            return createSidebarItem(item.icon, item.text, item.href, item.id);
        });
        var labelsLabel = document.createElement('div');
        var labelItems = [
            { icon: "fa-coffee", text: "Important", color: "w3-red", id: "label-important" },
            { icon: "fa-circle-o-notch", text: "Warning", color: "w3-green", id: "label-warning" },
            { icon: "fa-share-alt", text: "Information", color: "w3-blue", id: "label-info" }
        ];
        var labelElements = labelItems.map(function(item) {
            return createSidebarLabel(item.icon, item.text, item.color, item.id);
        });

        sidebar.id = "sidebar";
        sidebar.classList.add("w3-sidebar", "w3-bar-block", "w3-collapse", "w3-white", "w3-card");
        sidebar.style.width = "230px";
        sidebar.style.height = "auto";
        sidebar.style.top = "54px";
        sidebar.style.bottom = "0";
        sidebar.style.overflow = "auto";
        sidebar.style.zIndex = "3";

        navLabel.classList.add("w3-container", "w3-padding-16");
        navLabel.style.color = "#999";
        navLabel.style.fontSize = "small";
        navLabel.textContent = "MAIN NAVIGATION";

        labelsLabel.classList.add("w3-container", "w3-padding-16");
        labelsLabel.style.color = "#999";
        labelsLabel.style.fontSize = "small";
        labelsLabel.style.marginTop = "20px";
        labelsLabel.textContent = "LABELS";

        sidebar.appendChild(navLabel);
        menuElements.forEach(function(menuItem) {
            sidebar.appendChild(menuItem);
        });
        sidebar.appendChild(labelsLabel);
        labelElements.forEach(function(labelItem) {
            sidebar.appendChild(labelItem);
        });

        return sidebar;
    }

    // Items de la barra lateral
    function createSidebarItem(iconClass, text, href, elementId) {
        var link = document.createElement('a');
        var icon = document.createElement('i');
        var span = document.createElement('span');

        span.textContent = text;
        link.appendChild(icon);
        link.appendChild(span);

        link.id = elementId;
        link.href = href;
        link.classList.add("w3-bar-item", "w3-button", "w3-padding-large", "w3-hover-text-primary");

        icon.classList.add("fa", iconClass);
        icon.style.marginRight = "10px";
        icon.style.width = "20px";
        icon.style.textAlign = "center";

        return link;
    }

    // Botón para colapsar/expandir la barra lateral
    function createSidebarToggleButton() {
        var button = document.createElement('button');
        var icon = document.createElement('i');

        button.type = 'button';
        button.id = 'sidebar-toggle-btn';
        button.setAttribute('aria-label', 'Toggle sidebar');
        button.appendChild(icon);

        button.classList.add('w3-button', 'w3-large', 'w3-opacity-min');
        button.style.marginLeft = '10px';
        button.style.background = 'none';
        button.style.border = 'none';
        button.style.cursor = 'pointer';
        button.style.verticalAlign = 'middle';

        icon.classList.add('fa', 'fa-bars');
        icon.style.verticalAlign = 'middle';

        return button;
    }

    // Etiquetas de la barra lateral
    function createSidebarLabel(iconClass, text, colorClass, elementId) {
        var container = document.createElement('div');
        var icon = document.createElement('i');
        var badge = document.createElement('span');

        container.id = elementId;
        container.appendChild(icon);
        container.appendChild(badge);

        container.classList.add("w3-padding-small");

        icon.classList.add("fa", iconClass);
        icon.style.marginRight = "10px";
        icon.style.width = "20px";
        icon.style.textAlign = "center";

        var iconColorMap = {
            'w3-red': 'red',
            'w3-green': 'green',
            'w3-blue': 'blue'
        };
        icon.style.color = iconColorMap[colorClass] || 'currentColor';

        badge.classList.add("w3-margin-right");
        badge.textContent = text;

        return container;
    }

    // Contenido principal
    function createMainContent() {
        var main = document.createElement('main');
        main.id = "main-content";

        main.classList.add("w3-main");
        main.style.marginLeft = "230px";
        main.style.marginTop = "54px";
        main.style.padding = "20px";
        main.style.minHeight = "calc(100vh - 100px)";

        return main;
    }

    // Pie de página - footer
    function createFooter() {
        var footer = document.createElement('footer');
        var text = document.createElement('p');
        var span1 = document.createElement('span');
        var heart = document.createElement('i');
        var span2 = document.createElement('span');
        var link = document.createElement('a');

        span1.textContent = "Powered with ";
        span2.textContent = " by ";
        link.target = "_blank";
        link.textContent = "Rosma";

        text.appendChild(span1);
        text.appendChild(heart);
        text.appendChild(span2);
        text.appendChild(link);
        footer.appendChild(text);

        footer.id = "footer";
        footer.classList.add("w3-container", "w3-padding-16", "w3-light-grey");
        footer.style.marginLeft = "230px";

        text.classList.add("w3-small");
        text.style.textAlign = "center";

        heart.classList.add("fa", "fa-heart");
        heart.style.color = "red";

        return footer;
    }


// CLASE WebComponent
    class WCApplicationView extends HTMLElement {
        constructor(){
            super();

            // Referencias a elementos principales
            this._topBar = null;
            this._sidebar = null;
            this._mainContent = null;
            this._footer = null;
            
            // Referencias a elementos interactivos
            this._notificationBtn = null;
            this._userBtn = null;
            this._sidebarToggleBtn = null;
            this._menuItems = [];

            // Handlers - funciones normales, no arrow
            this._onNotificationClick = this._handleNotificationClick.bind(this);
            this._onUserClick = this._handleUserClick.bind(this);
            this._onSidebarToggleClick = this._handleSidebarToggleClick.bind(this);
            this._onMenuItemClick = this._handleMenuItemClick.bind(this);

            // RENDERIZAR EN EL CONSTRUCTOR
            this._render();
        }

        connectedCallback(){
            // Solo manejar eventos y lógica de conexión
            this._attachEventHandlers();
        }

        disconnectedCallback(){
            this._detachEventHandlers();
        }

        _render() {
            // Verificar si ya tiene contenido para evitar duplicados
            if (this.childElementCount > 0) {
                return;
            }

            // Crear estructura completa
            this._topBar = createTopBar();
            this._sidebar = createSidebar();
            this._mainContent = createMainContent();
            this._footer = createFooter();

            // Ensamblar en el DOM PRIMERO
            this.appendChild(this._topBar);
            this.appendChild(this._sidebar);
            this.appendChild(this._mainContent);
            this.appendChild(this._footer);

            // Guardar referencias a botones DESPUÉS de agregar al DOM
            this._notificationBtn = this.querySelector("#topbar-notification-btn");
            this._userBtn = this.querySelector("#topbar-user-btn");
            this._sidebarToggleBtn = this.querySelector("#sidebar-toggle-btn");

            // Guardar referencias a items de menú
            this._menuItems = [
                this.querySelector("#menu-dashboard"),
                this.querySelector("#menu-icons"),
                this.querySelector("#menu-forms"),
                this.querySelector("#menu-tables"),
                this.querySelector("#menu-profile"),
                this.querySelector("#menu-login"),
                this.querySelector("#menu-registration")
            ];
        }

        _attachEventHandlers(){         // Asignar handlers a botones de la barra sup.         
            if (this._notificationBtn) {
                this._notificationBtn.onclick = this._onNotificationClick;
            }

            if (this._userBtn){
                this._userBtn.onclick = this._onUserClick;
            }

            if (this._sidebarToggleBtn){
                this._sidebarToggleBtn.onclick = this._onSidebarToggleClick;
            }

            // Asignar handlers a items de menú
            var self = this;
            this._menuItems.forEach(function(item) {
                if (item){
                    item.onclick = self._onMenuItemClick;
                }
            });
        }

        _detachEventHandlers(){        // Remover handlers de botones de la barra sup.          
            if (this._notificationBtn){
                this._notificationBtn.onclick = null;
            }

            if (this._userBtn){
                this._userBtn.onclick = null;
            }

            if (this._sidebarToggleBtn){
                this._sidebarToggleBtn.onclick = null;
            }

            // Remover handlers de items de menú
            var self = this;
            this._menuItems.forEach(function(item) {
                if (item){
                    item.onclick = null;
                }
            });
        }


// MANEJADORES DE EVENTOS INTERNOS - funciones normales, no arrow
        _handleNotificationClick(event){
            event.preventDefault();
            
            // Traducir click de botón a evento 
            this.dispatchEvent(new CustomEvent('notification-click', {
                bubbles: true,
                detail: {source: 'topbar-notification-btn'}  
            }));
        }

        _handleUserClick(event){
            event.preventDefault();
            
            // Traducir click de botón a evento
            this.dispatchEvent(new CustomEvent('user-menu-click', {
                bubbles: true,
                detail: {source: 'topbar-user-btn' }  
            }));
        }

        _handleMenuItemClick(event){
            event.preventDefault();
            
            // Obtener información del item clickeado
            var menuItem = event.currentTarget;
            var menuId = menuItem ? menuItem.id : '';
            var menuText = menuItem ? menuItem.querySelector('span').textContent : '';
            
            // Traducir click de menú a evento 
            this.dispatchEvent(new CustomEvent('menu-item-click', {
                bubbles: true,
                detail: {
                    itemId: menuId,
                    itemText: menuText,
                    href: menuItem ? menuItem.href : ''
                }
            }));
        }

        _handleSidebarToggleClick(event) {        // Manejar colapso/expansión de la barra lateral
            event.preventDefault();
            if (!this._sidebar || !this._mainContent || !this._footer) {
                return;
            }

            var collapsed = this._sidebar.classList.toggle('w3-hide');
            if (collapsed) {
                this._sidebar.style.width = '0';
                this._mainContent.style.marginLeft = '0';
                this._footer.style.marginLeft = '0';
            }
            else {
                this._sidebar.style.width = '230px';
                this._mainContent.style.marginLeft = '230px';
                this._footer.style.marginLeft = '230px';
            }
        }

 // MÉTODOS PÚBLICOS DE ACTUALIZACIÓN DE VISTA 
        setActiveMenuItem(menuId){  //metodo para resaltar el item de menú activo
            var self = this;
            this._menuItems.forEach(function(item) {
                if (item){
                    if (item.id === menuId) {
                        item.classList.add("w3-text-primary");
                        item.classList.remove("w3-hover-text-primary");
                    }
                    else {
                        item.classList.remove("w3-text-primary");
                        item.classList.add("w3-hover-text-primary");
                    }
                }
            });
        }

        showNotification(message){
            // para futuras implementaciones
            console.log('Notificación:', message);
        }

        updateMainContent(content){   //metodo para actualizar el contenido principal
            // Limpiar contenido actual
            while (this._mainContent.firstChild) {
                this._mainContent.removeChild(this._mainContent.firstChild);
            }

            // Agregar nuevo contenido si se proporciona
            if (content) {
                this._mainContent.appendChild(content);
            }
        }

        toggleSidebar() {   //metodo para mostrar u ocultar la barra lateral
            if (this._sidebar){
                this._sidebar.classList.toggle("w3-show");
            }
        }

        // GETTERS  
        get mainContent(){
            return this._mainContent;
        }
        get sidebar(){
            return this._sidebar;
        }
        get topBar(){
            return this._topBar;
        }
    }

    // Registrar el WebComponent
    customElements.define('wc-application-view', WCApplicationView);


  function main() {
  var myApp = new WCApplicationView();
  var app = document.getElementById('app');
  if (app) {
    app.appendChild(myApp);
  }
}

window.onload = main;

</script>
</html>
