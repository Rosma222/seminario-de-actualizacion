<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>Calculadora MVC</title>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f0f0f0;
        font-family: Arial, sans-serif;
    }

    mi-calculadora table {
        border-collapse: separate;
        border-spacing: 5px;
        background-color: #e0e0e0;
        padding: 10px;
        border-radius: 10px;
        width: 50%;
    }

    mi-calculadora td {
        padding: 3px;
    }

    mi-calculadora #display {
        width: 100%;
        height: 50px;
        font-size: 30px;
        text-align: right;
        padding: 8px;
        border: 2px solid #999;
        border-radius: 8px;
        background-color: white;
        font-family: Arial, sans-serif;
        font-weight: bold;
        margin-bottom: 5px;
    }

    mi-calculadora button {
        width: 50px;
        height: 50px;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
        transition: all 0.1s;
        font-family: Arial, sans-serif;
    }

    mi-calculadora button:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 rgba(0, 0, 0, 0.2);
    }

    mi-calculadora .btn-numero     { background-color: #4a90e2; color: white; }
    mi-calculadora .btn-numero:hover     { background-color: #357abd; }
    mi-calculadora .btn-punto      { background-color: #4a90e2; color: white; }
    mi-calculadora .btn-punto:hover      { background-color: #357abd; }
    mi-calculadora .btn-operacion  { background-color: #7ed321; color: white; }
    mi-calculadora .btn-operacion:hover  { background-color: #6bb81a; }
    mi-calculadora .btn-resultado  { background-color: #f5a623; color: white; }
    mi-calculadora .btn-resultado:hover  { background-color: #d48e1b; }

    mi-calculadora .btn-borrar {
        color: white;
        font-family: Arial;
        font-weight: bold;
        font-size: 16px;
        background-color: #d0021b;
        box-shadow: 0px 4px #BB3E22;
        width: 100%;
        height: 40px;
        border-radius: 6px;
        border-color: #BB3E22;
    }
    mi-calculadora .btn-borrar:hover { background-color: #a00115; }
</style>
<body>
</body>
<script type="text/javascript">


//  MODELO
//  Responsabilidad: guardar y gestionar el dato de la aplicación.
//  No conoce ni a la Vista ni al Controlador.Hereda de EventTarget 

class CalculadoraModel extends EventTarget {

    constructor() {
        super();
        this._expression = '';     //expresión matematica
    }

    // Setter actualiza la expresión y notifica el cambio.
    set expression(newExpression) {
        if (this._expression !== newExpression) {
            this._expression = newExpression;
            this._changed();
        }
    }

    // Getter devuelve expresión actual
    get expression() {
        return this._expression;
    }

    // Agrega un caracter al final de la expresión actual
    agregar(caracter) {
        this.expression = this._expression + caracter;
    }

    // Evalúa la expresión matemática actual y guarda el resultado.
    // --- CORRECCIÓN ---> La lógica del cálculo del eval del controlador debe estar en el modelo. 
    // El controlador ejecuta un método sobre la instancia del modelo para obtener el resultado.
    calcular() {
        try {
            var resultado = eval(this._expression);
            this.expression = String(resultado);
        } catch (error) {
            this.expression = 'Error';
        }
    }

    // Limpia la expresión actual
    borrar() {
        this.expression = '';
    }

    // Despacha el evento changed hacia el exterior
    _changed() {
        this.dispatchEvent(new CustomEvent('changed'));
    }
}


//  VISTA  
//  Responsabilidad: construir la interfaz gráfica y traducir las interacciones del usuario
//  No conoce al Modelo ni ejecuta lógica de negocio.
//  Hereda de HTMLElement 

class CalculadoraView extends HTMLElement {

    constructor() {
        super();

        //  Crear el display 
        this._display = document.createElement('input');
        this._display.id = 'display';
        this._display.type = 'text';
        this._display.disabled = true;
        this._display.value = '';

        //  Crear tabla
        this._table = document.createElement('table');

        //  Crear botones numéricos 
        this._btn0 = this._crearBoton('0', 'btn-numero');
        this._btn1 = this._crearBoton('1', 'btn-numero');
        this._btn2 = this._crearBoton('2', 'btn-numero');
        this._btn3 = this._crearBoton('3', 'btn-numero');
        this._btn4 = this._crearBoton('4', 'btn-numero');
        this._btn5 = this._crearBoton('5', 'btn-numero');
        this._btn6 = this._crearBoton('6', 'btn-numero');
        this._btn7 = this._crearBoton('7', 'btn-numero');
        this._btn8 = this._crearBoton('8', 'btn-numero');
        this._btn9 = this._crearBoton('9', 'btn-numero');

        //  Crear botón punto decimal 
        this._btnPunto = this._crearBoton('.', 'btn-punto');

        //  Crear botones de operación 
        this._btnSumar       = this._crearBoton('+', 'btn-operacion');
        this._btnRestar      = this._crearBoton('-', 'btn-operacion');
        this._btnMultiplicar = this._crearBoton('*', 'btn-operacion');
        this._btnDividir     = this._crearBoton('/', 'btn-operacion');

        //  Crear botón resultado 
        this._btnResultado = this._crearBoton('=', 'btn-resultado');

        //  Crear botón borrar 
        this._btnBorrar = document.createElement('button');
        this._btnBorrar.className = 'btn-borrar';
        this._btnBorrar.innerText = 'Borrar';

        // estructura de la tabla 
        this._construirTabla();

        // Agregar tabla al componente 
        this.appendChild(this._table);
    }

    //  Getter el Controlador lee el valor del display 
    get value() {
        return this._display.value;
    }

    //  Setter el Controlador le indica a la Vista qué mostrar
    set value(text) {
        this._display.value = text;
    }

    //  connectedCallback el componente fue agregado al DOM 
    connectedCallback() {
        console.log('mi-calculadora agregada al DOM');

        this._btn0.onclick           = this.onBtn0Click.bind(this);
        this._btn1.onclick           = this.onBtn1Click.bind(this);
        this._btn2.onclick           = this.onBtn2Click.bind(this);
        this._btn3.onclick           = this.onBtn3Click.bind(this);
        this._btn4.onclick           = this.onBtn4Click.bind(this);
        this._btn5.onclick           = this.onBtn5Click.bind(this);
        this._btn6.onclick           = this.onBtn6Click.bind(this);
        this._btn7.onclick           = this.onBtn7Click.bind(this);
        this._btn8.onclick           = this.onBtn8Click.bind(this);
        this._btn9.onclick           = this.onBtn9Click.bind(this);
        this._btnPunto.onclick       = this.onBtnPuntoClick.bind(this);
        this._btnSumar.onclick       = this.onBtnSumarClick.bind(this);
        this._btnRestar.onclick      = this.onBtnRestarClick.bind(this);
        this._btnMultiplicar.onclick = this.onBtnMultiplicarClick.bind(this);
        this._btnDividir.onclick     = this.onBtnDividirClick.bind(this);
        this._btnResultado.onclick   = this.onBtnResultadoClick.bind(this);
        this._btnBorrar.onclick      = this.onBtnBorrarClick.bind(this);
    }

    //  disconnectedCallback el componente fue removido del DOM 
    // Se asigna null a cada onclick para liberar los handlers.
    disconnectedCallback() {
        console.log('mi-calculadora removida del DOM');

        this._btn0.onclick           = null;
        this._btn1.onclick           = null;
        this._btn2.onclick           = null;
        this._btn3.onclick           = null;
        this._btn4.onclick           = null;
        this._btn5.onclick           = null;
        this._btn6.onclick           = null;
        this._btn7.onclick           = null;
        this._btn8.onclick           = null;
        this._btn9.onclick           = null;
        this._btnPunto.onclick       = null;
        this._btnSumar.onclick       = null;
        this._btnRestar.onclick      = null;
        this._btnMultiplicar.onclick = null;
        this._btnDividir.onclick     = null;
        this._btnResultado.onclick   = null;
        this._btnBorrar.onclick      = null;
    }


    //  MANEJADORES DE EVENTOS DE LA VISTA -- Cada método traduce el click en un evento request
  
    // Botones numeros y coma
    onBtn0Click()     { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '0' } })); }
    onBtn1Click()     { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '1' } })); }
    onBtn2Click()     { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '2' } })); }
    onBtn3Click()     { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '3' } })); }
    onBtn4Click()     { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '4' } })); }
    onBtn5Click()     { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '5' } })); }
    onBtn6Click()     { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '6' } })); }
    onBtn7Click()     { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '7' } })); }
    onBtn8Click()     { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '8' } })); }
    onBtn9Click()     { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '9' } })); }
    onBtnPuntoClick() { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '.' } })); }

    // Botones de operaciones
    onBtnSumarClick()       { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '+' } })); }
    onBtnRestarClick()      { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '-' } })); }
    onBtnMultiplicarClick() { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '*' } })); }
    onBtnDividirClick()     { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'agregar', caracter: '/' } })); }

    // Botón resultado- solicita calcular
    onBtnResultadoClick() { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'calcular' } })); }

    // Botón borrar
    onBtnBorrarClick() { this.dispatchEvent(new CustomEvent('request', { detail: { accion: 'borrar' } })); }

    //  Helpers 
    _crearBoton(texto, clase) {
        const btn = document.createElement('button');
        btn.innerText = texto;
        btn.className = clase;
        return btn;
    }

    _crearTd(elemento) {
        const td = document.createElement('td');
        td.appendChild(elemento);
        return td;
    }

    _construirTabla() {
        // Fila display
        const trDisplay = document.createElement('tr');
        const tdDisplay = document.createElement('td');
        tdDisplay.colSpan = 4;
        tdDisplay.appendChild(this._display);
        trDisplay.appendChild(tdDisplay);
        this._table.appendChild(trDisplay);

        // Fila 1: 7 8 9 +
        const tr1 = document.createElement('tr');
        tr1.appendChild(this._crearTd(this._btn7));
        tr1.appendChild(this._crearTd(this._btn8));
        tr1.appendChild(this._crearTd(this._btn9));
        tr1.appendChild(this._crearTd(this._btnSumar));
        this._table.appendChild(tr1);

        // Fila 2: 4 5 6 -
        const tr2 = document.createElement('tr');
        tr2.appendChild(this._crearTd(this._btn4));
        tr2.appendChild(this._crearTd(this._btn5));
        tr2.appendChild(this._crearTd(this._btn6));
        tr2.appendChild(this._crearTd(this._btnRestar));
        this._table.appendChild(tr2);

        // Fila 3: 1 2 3 *
        const tr3 = document.createElement('tr');
        tr3.appendChild(this._crearTd(this._btn1));
        tr3.appendChild(this._crearTd(this._btn2));
        tr3.appendChild(this._crearTd(this._btn3));
        tr3.appendChild(this._crearTd(this._btnMultiplicar));
        this._table.appendChild(tr3);

        // Fila 4: 0 . = /
        const tr4 = document.createElement('tr');
        tr4.appendChild(this._crearTd(this._btn0));
        tr4.appendChild(this._crearTd(this._btnPunto));
        tr4.appendChild(this._crearTd(this._btnResultado));
        tr4.appendChild(this._crearTd(this._btnDividir));
        this._table.appendChild(tr4);

        // Fila 5: Borrar (ocupa toda la fila)
        const trBorrar = document.createElement('tr');
        const tdBorrar = document.createElement('td');
        tdBorrar.colSpan = 4;
        tdBorrar.appendChild(this._btnBorrar);
        trBorrar.appendChild(tdBorrar);
        this._table.appendChild(trBorrar);
    }
}

customElements.define('mi-calculadora', CalculadoraView);



//  CONTROLADOR
//  Responsabilidad: mediar entre el Modelo y la Vista.
//  Escucha eventos de ambos y actualiza al otro según corresponda.
//  Recibe las instancias por agregación 

class CalculadoraController {

    constructor(view, model) {
        this._view  = view;
        this._model = model;

        this._onModelChanged = this.onModelChanged.bind(this);
        this._onViewRequest  = this.onViewRequest.bind(this);
    }

    // enable() suscribe el Controlador a los eventos del Modelo y la Vista
    enable() {
        this._model.addEventListener('changed', this._onModelChanged);
        this._view.addEventListener('request',  this._onViewRequest);
    }

    // disable() desuscribe el Controlador , libera los listeners
    disable() {
        this._model.removeEventListener('changed', this._onModelChanged);
        this._view.removeEventListener('request',  this._onViewRequest);
    }

    // El Modelo notifica cambio > actualizar el display 
    onModelChanged() {
        console.log('Modelo cambió → actualizando vista');
        this._view.value = this._model.expression;
    }

    // La Vista notifica acción de usuario > el Controlador delega al Modelo.
    // El Controlador no procesa nada: solo identifica la acción y llama
    // al método correspondiente del Modelo.
    onViewRequest(event) {
        const accion   = event.detail.accion;
        const caracter = event.detail.caracter;

        if (accion === 'agregar') {
            console.log('Vista solicita agregar: ' + caracter);
            this._model.agregar(caracter);
        }
        else if (accion === 'calcular') {
            console.log('Vista solicita calcular el resultado');
            this._model.calcular();
        }
        else if (accion === 'borrar') {
            console.log('Vista solicita borrar');
            this._model.borrar();
        }
    }
}


//  FUNCIÓN MAIN
//  Instancia las 3 capas independientes y las conecta.
//  Modelo y Vista se crean sin conocerse. Controlador los recibe y asocia mediante enable().

function main() {
    let myModel      = new CalculadoraModel();
    let myView       = new CalculadoraView();
    let myController = new CalculadoraController(myView, myModel);

    myController.enable();

    document.body.appendChild(myView);
}

window.onload = main;

</script>

</html>
