<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ecualizador</title>
</head>

<body>
</body>

<script>

  // FUNCIÓN EXTERNA PARA CSS - Encapsulamiento del estilo
  function GetEqualizerCSSStyle() {
    return `
      :host {
        display: inline-block;
        font-family: 'Tahoma', sans-serif;
        font-size: 11px;
        background-color: #d4d0c8;
        border: 2px outset #ffffff;
        padding: 2px;
        box-sizing: border-box;
      }
      .window-frame { border: 1px solid #808080; padding: 4px; }
      .title-bar {
        background: linear-gradient(to right, #000080, #1084d0);
        color: white;
        padding: 2px 4px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }
      .close-btn {
        background: #c0c0c0; color: black; border: 1px outset white;
        width: 16px; height: 14px; font-size: 9px; line-height: 10px;
        text-align: center; cursor: pointer; padding: 0;
      }
      .top-controls { margin-bottom: 6px; display: flex; gap: 4px; }
      .preset-input { width: 150px; }
      .main-area { display: flex; justify-content: space-between; }
      .sliders-area { display: flex; gap: 4px; background: #d4d0c8; padding: 10px 0; }
      .slider-col { display: flex; flex-direction: column; align-items: center; width: 40px; position: relative; }
      .slider-col input[type=range] {
        -webkit-appearance: none; appearance: none;
        width: 95px; height: 2px; background: white; border: 1px solid gray;
        transform: rotate(-90deg); margin: 55px 0; cursor: pointer;
      }
      .slider-col input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none; width: 24px; height: 10px; background: #d4d0c8; border: 1px solid black;
      }
      .freq-label { position: absolute; top: -2px; font-size: 10px; }
      .db-label { position: absolute; bottom: -2px; font-size: 10px; }
      .buttons-area { display: flex; flex-direction: column; gap: 6px; justify-content: center; padding-left: 8px; }
      .btn {
        background: #d4d0c8; border: 2px outset white; padding: 4px 8px; cursor: pointer; min-width: 70px; font-family: inherit;
      }
      .btn:active { border-style: inset; }
    `;
  }

  //Definicion del webcomponent  
  class GraphicEQ extends HTMLElement {
    constructor() {
      super();
      this.attachShadow({ mode: 'open' });

      // datos internos del ecualizador
      this._eqData = {
        presetName: 'Custom',
        bands: [
          { freq: '32Hz', value: 0 },
          { freq: '64Hz', value: 0 },
          { freq: '130Hz', value: 0 },
          { freq: '260Hz', value: 0 },
          { freq: '500Hz', value: 0 },
          { freq: '1k', value: 0 },
          { freq: '2k', value: 0 },
          { freq: '4k', value: 0 },
          { freq: '8.3k', value: 0 },
          { freq: '16.5k', value: 0 }
        ]
      };

      // Array para referencias a los sliders
      this.sliderInputs = [];
      this.dbLabels = [];

      // Creación de elementos del DOM 
      // Estilos encapsulados
      var style = document.createElement('style');
      style.textContent = GetEqualizerCSSStyle();
      this.shadowRoot.appendChild(style);

      // Estructura Principal
      this.frame = document.createElement('div');
      this.frame.className = 'window-frame';

      // Barra de Título
      this.titleBar = document.createElement('div');
      this.titleBar.className = 'title-bar';
      this.titleText = document.createElement('span');
      this.titleText.textContent = 'Graphic EQ';
      this.closeBtn = document.createElement('button');
      this.closeBtn.className = 'close-btn';
      this.closeBtn.textContent = 'X';
      this.titleBar.appendChild(this.titleText);
      this.titleBar.appendChild(this.closeBtn);

      // Selectores de preset
      this.topControls = document.createElement('div');
      this.topControls.className = 'top-controls';
      this.presetInput = document.createElement('input');
      this.presetInput.type = 'text';
      this.presetInput.className = 'preset-input';
      this.presetInput.value = this._eqData.presetName;
      
      //boton guardar
      this.saveBtn = document.createElement('button');
      this.saveBtn.className = 'btn';
      this.saveBtn.textContent = '💾'; 
      this.saveBtn.style.padding = '2px 6px';
      this.saveBtn.title = 'Guardar preset';
      
      //boton eliminar
      this.deleteBtn = document.createElement('button');
      this.deleteBtn.className = 'btn';
      this.deleteBtn.textContent = '✖';
      this.deleteBtn.style.padding = '2px 6px';
      this.deleteBtn.title = 'Eliminar preset';
      
      this.topControls.appendChild(this.presetInput);
      this.topControls.appendChild(this.saveBtn);
      this.topControls.appendChild(this.deleteBtn);
      
      // Area principal (sliders y botones)
      this.mainArea = document.createElement('div');
      this.mainArea.className = 'main-area';

      this.slidersArea = document.createElement('div');
      this.slidersArea.className = 'sliders-area';

      // CREACIÓN DE SLIDERS EN EL CONSTRUCTOR
      this._createSliders();

      this.buttonsArea = document.createElement('div');
      this.buttonsArea.className = 'buttons-area';
      this.btnOK = document.createElement('button'); 
      this.btnOK.className = 'btn'; 
      this.btnOK.textContent = 'OK';
      this.btnCancel = document.createElement('button'); 
      this.btnCancel.className = 'btn'; 
      this.btnCancel.textContent = 'Cancel';
      this.btnAudition = document.createElement('button'); 
      this.btnAudition.className = 'btn'; 
      this.btnAudition.textContent = 'Audition';
      this.btnHelp = document.createElement('button'); 
      this.btnHelp.className = 'btn'; 
      this.btnHelp.textContent = 'Help';
      
      this.buttonsArea.appendChild(this.btnOK);
      this.buttonsArea.appendChild(this.btnCancel);
      this.buttonsArea.appendChild(this.btnAudition);
      this.buttonsArea.appendChild(this.btnHelp);
      
      this.mainArea.appendChild(this.slidersArea);
      this.mainArea.appendChild(this.buttonsArea);
      this.frame.appendChild(this.titleBar);
      this.frame.appendChild(this.topControls);
      this.frame.appendChild(this.mainArea);
      this.shadowRoot.appendChild(this.frame);
    }

    connectedCallback() {
      this._attachEvents();
    }

    // MÉTODO PRIVADO: Crea los sliders (llamado desde constructor)
    _createSliders() {
      this.sliderInputs = [];
      this.dbLabels = [];

      for (var i = 0; i < this._eqData.bands.length; i++) {
        var band = this._eqData.bands[i];
        var col = document.createElement('div');
        col.className = 'slider-col';

        var freqLbl = document.createElement('div');
        freqLbl.className = 'freq-label';
        freqLbl.textContent = band.freq;

        var input = document.createElement('input');
        input.type = 'range';
        input.min = -12;
        input.max = 12;
        input.value = band.value;
        input.dataset.index = i;

        var dbLbl = document.createElement('div');
        dbLbl.className = 'db-label';
        dbLbl.textContent = (band.value > 0 ? '+' : '') + band.value + 'dB';

        col.appendChild(freqLbl);
        col.appendChild(input);
        col.appendChild(dbLbl);
        this.slidersArea.appendChild(col);
        
        this.sliderInputs.push(input);
        this.dbLabels.push(dbLbl);
      }
    }

    // Configuración de eventos
    _attachEvents() {
      this.slidersArea.oninput = this._onSliderInput.bind(this);
      this.saveBtn.onclick = this._onSavePreset.bind(this);
      this.deleteBtn.onclick = this._onDeletePreset.bind(this);
      this.presetInput.oninput = this._onPresetNameInput.bind(this);
    }

    //  Actualizacion de datos al mover el slider
    _onSliderInput(e) {
      if (e.target.type === 'range') {
        var idx = parseInt(e.target.dataset.index);
        var val = parseInt(e.target.value);
        
        this._eqData.bands[idx].value = val;
        this.dbLabels[idx].textContent = (val > 0 ? '+' : '') + val + 'dB';
      }
    }

    //Guardar preset actual
    _onSavePreset() {
      var presetName = this.presetInput.value.trim();
      if (presetName) {
        console.log('Guardando preset:', presetName, this.getData());
        alert('Preset "' + presetName + '" guardado');
      }
    }

    // Eliminar preset
    _onDeletePreset() {
      var presetName = this.presetInput.value.trim();
      if (presetName) {
        console.log('Eliminando preset:', presetName);
        alert('Preset "' + presetName + '" eliminado');
        
        this._eqData.presetName = 'Default';
        for (var i = 0; i < this._eqData.bands.length; i++) {
          this._eqData.bands[i].value = 0;
        }
        
        this._update();
      }
    }

    //Sincronizar nombre del preset
    _onPresetNameInput(e) {
      this._eqData.presetName = e.target.value;
    }

    // SOLO ACTUALIZA VALORES, NO CREA ELEMENTOS
    _update() {
      for (var i = 0; i < this._eqData.bands.length; i++) {
        var band = this._eqData.bands[i];
        this.sliderInputs[i].value = band.value;
        this.dbLabels[i].textContent = (band.value > 0 ? '+' : '') + band.value + 'dB';
      }
      this.presetInput.value = this._eqData.presetName;
    }

    //Obtener datos
    getData() {
      return JSON.parse(JSON.stringify(this._eqData));
    }

    //  Asigna nuevos datos y refresca la UI 
    setData(newData) {
      if (!newData || !newData.bands) return;
      this._eqData = JSON.parse(JSON.stringify(newData));
      this._update();
    }

    disconnectedCallback() {
       // Limpieza de eventos para evitar memory leaks
      this.slidersArea.oninput = null;
      this.saveBtn.onclick = null;
      this.deleteBtn.onclick = null;
      this.presetInput.oninput = null;
    }
  
}

  customElements.define('graphic-eq', GraphicEQ);

  function main() {   
    var myEqualizer = new GraphicEQ();
    document.body.appendChild(myEqualizer);
  }

  window.onload = main;
</script>
</html>
