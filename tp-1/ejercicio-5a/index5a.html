<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8" />
<title>FACTURA AFIP</title>

<style>
/* Estilos del formulario */
.factura-container {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
  background-color: #f9f9f9;
  border-radius: 5px;
}

h2 {
  text-align: center;
  color: #333;
}

fieldset {
  margin-bottom: 15px;
  border: 1px solid #ddd;
  border-radius: 5px;
  padding: 15px;
}

legend {
  font-weight: bold;
  color: #555;
  padding: 0 10px;
}

label {
  display: block;
  margin-top: 10px;
  margin-bottom: 5px;
  font-weight: 500;
}

input[type="text"],
input[type="number"],
input[type="date"] {
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 3px;
  box-sizing: border-box;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background-color: #45a049;
}

.btn-facturar {
  background-color: #2196F3;
  width: 100%;
  font-size: 18px;
  padding: 15px;
}

.btn-facturar:hover {
  background-color: #0b7dda;
}

.items-container {
  margin-bottom: 10px;
}

.item-factura {
  background-color: #fff;
  border-radius: 3px;
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
}
</style>

</head>

<body> 
</body>

<script>

// Clase principal del WebComponent
class FacturaAFIPForm extends HTMLElement {
  
  constructor() {
    super();
    this.items = [];
    this.crearFormulario(); // Solo crea en memoria, NO agrega al DOM
  }
  
  connectedCallback() {
    this.btnAgregarItem.onclick = this.agregarItem.bind(this);
    this.btnFacturar.onclick = this.generarFactura.bind(this);
  }
  
  disconnectedCallback() {
    console.log('Componente factura-afip-form desconectado');
  }
  
  // Método para montar el formulario en el componente (se llama desde main)
  montar() {
    this.appendChild(this.contenedor);
    this.agregarItem(); // Agregar un item inicial
  }
  
  // Método para crear elementos del formulario (en memoria)
  crearFormulario() {
    this.contenedor = document.createElement('div');
    this.contenedor.className = 'factura-container';
    
    var titulo = document.createElement('h2');
    titulo.textContent = 'Cargar Factura AFIP';
    this.contenedor.appendChild(titulo);
    
    var seccionCliente = document.createElement('fieldset');
    var leyendaCliente = document.createElement('legend');
    leyendaCliente.textContent = 'Datos del Cliente';
    seccionCliente.appendChild(leyendaCliente);
    
    this.crearCampoTexto(seccionCliente, 'razonSocial', 'Razón Social / Apellido y Nombre:', 'text');
    this.crearCampoTexto(seccionCliente, 'domicilio', 'Domicilio:', 'text');
    this.crearCampoTexto(seccionCliente, 'cuit', 'CUIT:', 'number');

    this.contenedor.appendChild(seccionCliente);
    
    var seccionFactura = document.createElement('fieldset');
    var leyendaFactura = document.createElement('legend');
    leyendaFactura.textContent = 'Datos de la Factura';
    seccionFactura.appendChild(leyendaFactura);
    
    var labelTipo = document.createElement('label');
    labelTipo.textContent = 'Tipo de Factura:';
    seccionFactura.appendChild(labelTipo);
    seccionFactura.appendChild(document.createElement('br'));
    
    this.inputTipoFactura = document.createElement('input');
    this.inputTipoFactura.type = 'text';
    this.inputTipoFactura.value = 'B';
    this.inputTipoFactura.readOnly = true;
    this.inputTipoFactura.name = 'tipoFactura';
    seccionFactura.appendChild(this.inputTipoFactura);
    seccionFactura.appendChild(document.createElement('br'));
    seccionFactura.appendChild(document.createElement('br'));
    
    this.crearCampoTexto(seccionFactura, 'fechaEmision', 'Fecha de Emisión:', 'date');
    this.crearCampoTexto(seccionFactura, 'numeroFactura', 'Número de Factura:', 'number');
    
    this.contenedor.appendChild(seccionFactura);
    
    var seccionItems = document.createElement('fieldset');
    var leyendaItems = document.createElement('legend');
    leyendaItems.textContent = 'Items de la Factura';
    seccionItems.appendChild(leyendaItems);
    
    this.itemsContainer = document.createElement('div');
    this.itemsContainer.className = 'items-container';
    seccionItems.appendChild(this.itemsContainer);
    
    this.btnAgregarItem = document.createElement('button');
    this.btnAgregarItem.type = 'button';
    this.btnAgregarItem.textContent = '+ Agregar Item';
    
    seccionItems.appendChild(this.btnAgregarItem);
    seccionItems.appendChild(document.createElement('br'));
    
    this.contenedor.appendChild(seccionItems);
    
    var seccionTotales = document.createElement('fieldset');
    var leyendaTotales = document.createElement('legend');
    leyendaTotales.textContent = 'Totales';
    seccionTotales.appendChild(leyendaTotales);
    
    var labelSubtotal = document.createElement('label');
    labelSubtotal.textContent = 'Subtotal:';
    seccionTotales.appendChild(labelSubtotal);
    seccionTotales.appendChild(document.createElement('br'));
    
    this.inputSubtotal = document.createElement('input');
    this.inputSubtotal.type = 'number';
    this.inputSubtotal.readOnly = true;
    this.inputSubtotal.name = 'subtotal';
    this.inputSubtotal.value = '0.00';
    seccionTotales.appendChild(this.inputSubtotal);
    seccionTotales.appendChild(document.createElement('br'));
    
    var labelImpuestos = document.createElement('label');
    labelImpuestos.textContent = 'Impuestos (21%):';
    seccionTotales.appendChild(labelImpuestos);
    seccionTotales.appendChild(document.createElement('br'));
    
    this.inputImpuestos = document.createElement('input');
    this.inputImpuestos.type = 'number';
    this.inputImpuestos.readOnly = true;
    this.inputImpuestos.name = 'impuestos';
    this.inputImpuestos.value = '0.00';
    seccionTotales.appendChild(this.inputImpuestos);
    seccionTotales.appendChild(document.createElement('br'));
    
    var labelTotal = document.createElement('label');
    labelTotal.textContent = 'Total:';
    seccionTotales.appendChild(labelTotal);
    seccionTotales.appendChild(document.createElement('br'));
    
    this.inputTotal = document.createElement('input');
    this.inputTotal.type = 'number';
    this.inputTotal.readOnly = true;
    this.inputTotal.name = 'total';
    this.inputTotal.value = '0.00';
    seccionTotales.appendChild(this.inputTotal);
    seccionTotales.appendChild(document.createElement('br'));
    
    this.contenedor.appendChild(seccionTotales);
    
    this.btnFacturar = document.createElement('button');
    this.btnFacturar.type = 'button';
    this.btnFacturar.textContent = 'Generar Factura';
    this.btnFacturar.className = 'btn-facturar';
    
    this.contenedor.appendChild(this.btnFacturar);
    
    
  }
  
  crearCampoTexto(contenedor, nombre, etiqueta, tipo) {
    var label = document.createElement('label');
    label.textContent = etiqueta;
    label.htmlFor = nombre;
    contenedor.appendChild(label);
    contenedor.appendChild(document.createElement('br'));
    
    var input = document.createElement('input');
    input.type = tipo;
    input.name = nombre;
    input.id = nombre;
    input.required = true;
    contenedor.appendChild(input);
    contenedor.appendChild(document.createElement('br'));
  }
  
  agregarItem() {
    var itemIndex = this.items.length;
    
    var itemDiv = document.createElement('div');
    itemDiv.className = 'item-factura';
    
    var labelCodigo = document.createElement('label');
    labelCodigo.textContent = 'Código:';
    itemDiv.appendChild(labelCodigo);
    
    var inputCodigo = document.createElement('input');
    inputCodigo.type = 'text';
    inputCodigo.name = 'codigo_' + itemIndex;
    inputCodigo.placeholder = 'Código';
    inputCodigo.required = true;
    itemDiv.appendChild(inputCodigo);
    itemDiv.appendChild(document.createElement('br'));
    
    var labelDesc = document.createElement('label');
    labelDesc.textContent = 'Descripción:';
    itemDiv.appendChild(labelDesc);
    
    var inputDesc = document.createElement('input');
    inputDesc.type = 'text';
    inputDesc.name = 'descripcion_' + itemIndex;
    inputDesc.placeholder = 'Descripción del producto/servicio';
    inputDesc.required = true;
    inputDesc.style.width = '300px';
    itemDiv.appendChild(inputDesc);
    itemDiv.appendChild(document.createElement('br'));
    
    var labelCant = document.createElement('label');
    labelCant.textContent = 'Cantidad:';
    itemDiv.appendChild(labelCant);
    
    var inputCant = document.createElement('input');
    inputCant.type = 'number';
    inputCant.name = 'cantidad_' + itemIndex;
    inputCant.placeholder = 'Cant';
    inputCant.min = '1';
    inputCant.value = '1';
    inputCant.required = true;
    inputCant.onchange = this.calcularTotales.bind(this);
    itemDiv.appendChild(inputCant);
    itemDiv.appendChild(document.createElement('br'));
    
    var labelPrecio = document.createElement('label');
    labelPrecio.textContent = 'Precio Unitario:';
    itemDiv.appendChild(labelPrecio);
    
    var inputPrecio = document.createElement('input');
    inputPrecio.type = 'number';
    inputPrecio.name = 'precio_' + itemIndex;
    inputPrecio.placeholder = 'Precio';
    inputPrecio.min = '0';
    inputPrecio.step = '0.01';
    inputPrecio.required = true;
    inputPrecio.onchange = this.calcularTotales.bind(this);
    itemDiv.appendChild(inputPrecio);
    itemDiv.appendChild(document.createElement('br'));
    
    var btnEliminar = document.createElement('button');
    btnEliminar.type = 'button';
    btnEliminar.textContent = 'Eliminar Item';
    btnEliminar.onclick = this.eliminarItem.bind(this, itemDiv);
    itemDiv.appendChild(btnEliminar);
    
    this.itemsContainer.appendChild(itemDiv);
    this.items.push(itemDiv);
  }
  
  eliminarItem(itemElement) {
    if (this.items.length > 1) {
      var index = this.items.indexOf(itemElement);
      if (index > -1) {
        this.items.splice(index, 1);
      }
      itemElement.parentNode.removeChild(itemElement);
      this.calcularTotales();
    } else {
      alert('Debe haber al menos un item en la factura');
    }
  }
  
  calcularTotales() {
    var subtotal = 0;
    
    for (var i = 0; i < this.items.length; i++) {
      var item = this.items[i];
      var cantidadInput = item.querySelector('input[name^="cantidad_"]');
      var precioInput = item.querySelector('input[name^="precio_"]');
      
      if (cantidadInput && precioInput) {
        var cantidad = parseFloat(cantidadInput.value) || 0;
        var precio = parseFloat(precioInput.value) || 0;
        subtotal += cantidad * precio;
      }
    }
    
    var impuestos = subtotal * 0.21;
    var total = subtotal + impuestos;
    
    this.inputSubtotal.value = subtotal.toFixed(2);
    this.inputImpuestos.value = impuestos.toFixed(2);
    this.inputTotal.value = total.toFixed(2);
  }
  
  // Método para generar la factura en otra pestaña 
  generarFactura() {
    if (!this.validarFormulario()) {
      alert('Por favor, complete todos los campos requeridos');
      return;
    }
    
    var datos = this.obtenerDatosFormulario();
    var nuevaPestana = window.open('', '_blank');
    var doc = nuevaPestana.document;
    
    // Agregar título al head
    var title = doc.createElement('title');
    title.textContent = 'Factura ' + datos.tipoFactura + ' - ' + datos.numeroFactura;
    doc.head.appendChild(title);
    
    // idioma
    doc.documentElement.lang = 'es';
    
    // Construir la factura usando estilos inline
    var facturaDiv = doc.createElement('div');
    facturaDiv.style.maxWidth = '800px';
    facturaDiv.style.margin = '20px auto';
    facturaDiv.style.border = '2px solid #000';
    facturaDiv.style.padding = '20px';
    facturaDiv.style.fontFamily = 'Arial, sans-serif';
    
    // Header
    var headerDiv = doc.createElement('div');
    headerDiv.style.display = 'flex';
    headerDiv.style.justifyContent = 'space-between';
    headerDiv.style.marginBottom = '20px';
    
    var logoDiv = doc.createElement('div');
    logoDiv.style.fontSize = '24px';
    logoDiv.style.fontWeight = 'bold';
    logoDiv.textContent = 'AFIP';
    
    var tipoFacturaDiv = doc.createElement('div');
    tipoFacturaDiv.style.fontSize = '32px';
    tipoFacturaDiv.style.fontWeight = 'bold';
    tipoFacturaDiv.style.border = '3px solid #000';
    tipoFacturaDiv.style.padding = '10px';
    tipoFacturaDiv.textContent = datos.tipoFactura;
    
    headerDiv.appendChild(logoDiv);
    headerDiv.appendChild(tipoFacturaDiv);
    facturaDiv.appendChild(headerDiv);
    
    // Datos de la empresa
    var datosEmpresaDiv = doc.createElement('div');
    datosEmpresaDiv.style.marginBottom = '20px';
    
    var strong1 = doc.createElement('strong');
    strong1.textContent = 'FACTURA';
    datosEmpresaDiv.appendChild(strong1);
    datosEmpresaDiv.appendChild(doc.createElement('br'));
    datosEmpresaDiv.appendChild(doc.createTextNode('Punto de Venta: 0002'));
    datosEmpresaDiv.appendChild(doc.createElement('br'));
    datosEmpresaDiv.appendChild(doc.createTextNode('Nro. de Factura: ' + datos.numeroFactura));
    datosEmpresaDiv.appendChild(doc.createElement('br'));
    datosEmpresaDiv.appendChild(doc.createTextNode('Fecha de Emisión: ' + datos.fechaEmision));
    datosEmpresaDiv.appendChild(doc.createElement('br'));
    datosEmpresaDiv.appendChild(doc.createTextNode('CUIT: ' + datos.cuit));
    
    facturaDiv.appendChild(datosEmpresaDiv);
    
    // Datos del cliente
    var datosClienteDiv = doc.createElement('div');
    datosClienteDiv.style.backgroundColor = '#f0f0f0';
    datosClienteDiv.style.padding = '10px';
    datosClienteDiv.style.marginBottom = '20px';
    
    var strong2 = doc.createElement('strong');
    strong2.textContent = 'Datos del Cliente:';
    datosClienteDiv.appendChild(strong2);
    datosClienteDiv.appendChild(doc.createElement('br'));
    datosClienteDiv.appendChild(doc.createTextNode('Razón Social: ' + datos.razonSocial));
    datosClienteDiv.appendChild(doc.createElement('br'));
    datosClienteDiv.appendChild(doc.createTextNode('Domicilio: ' + datos.domicilio));
    datosClienteDiv.appendChild(doc.createElement('br'));
    datosClienteDiv.appendChild(doc.createTextNode('CUIT: ' + datos.cuit));
    
    facturaDiv.appendChild(datosClienteDiv);
    
    // Tabla de items
    var tablaItems = doc.createElement('table');
    tablaItems.style.width = '100%';
    tablaItems.style.borderCollapse = 'collapse';
    tablaItems.style.marginBottom = '20px';
    
    var thead = doc.createElement('thead');
    var headerRow = doc.createElement('tr');
    
    var headers = ['Código', 'Descripción', 'Cantidad', 'Precio Unitario', 'Subtotal'];
    headers.forEach(function(texto) {
      var th = doc.createElement('th');
      th.textContent = texto;
      th.style.border = '1px solid #000';
      th.style.padding = '8px';
      th.style.textAlign = 'left';
      th.style.backgroundColor = '#e0e0e0';
      headerRow.appendChild(th);
    });
    
    thead.appendChild(headerRow);
    tablaItems.appendChild(thead);
    
    var tbody = doc.createElement('tbody');
    
    for (var i = 0; i < datos.items.length; i++) {
      var item = datos.items[i];
      var subtotalItem = item.cantidad * item.precioUnitario;
      
      var fila = doc.createElement('tr');
      
      var tdCodigo = doc.createElement('td');
      tdCodigo.textContent = item.codigo;
      tdCodigo.style.border = '1px solid #000';
      tdCodigo.style.padding = '8px';
      fila.appendChild(tdCodigo);
      
      var tdDesc = doc.createElement('td');
      tdDesc.textContent = item.descripcion;
      tdDesc.style.border = '1px solid #000';
      tdDesc.style.padding = '8px';
      fila.appendChild(tdDesc);
      
      var tdCant = doc.createElement('td');
      tdCant.textContent = item.cantidad;
      tdCant.style.border = '1px solid #000';
      tdCant.style.padding = '8px';
      fila.appendChild(tdCant);
      
      var tdPrecio = doc.createElement('td');
      tdPrecio.textContent = '$' + parseFloat(item.precioUnitario).toFixed(2);
      tdPrecio.style.border = '1px solid #000';
      tdPrecio.style.padding = '8px';
      fila.appendChild(tdPrecio);
      
      var tdSubtotal = doc.createElement('td');
      tdSubtotal.textContent = '$' + subtotalItem.toFixed(2);
      tdSubtotal.style.border = '1px solid #000';
      tdSubtotal.style.padding = '8px';
      fila.appendChild(tdSubtotal);
      
      tbody.appendChild(fila);
    }
    
    tablaItems.appendChild(tbody);
    facturaDiv.appendChild(tablaItems);
    
    // Tabla de totales
    var tablaTotales = doc.createElement('table');
    tablaTotales.style.width = '100%';
    tablaTotales.style.textAlign = 'right';
    
    var filaSubtotal = doc.createElement('tr');
    var tdLabelSubtotal = doc.createElement('td');
    tdLabelSubtotal.textContent = 'Subtotal:';
    tdLabelSubtotal.style.padding = '5px 10px';
    var tdValorSubtotal = doc.createElement('td');
    tdValorSubtotal.textContent = '$' + datos.subtotal;
    tdValorSubtotal.style.padding = '5px 10px';
    filaSubtotal.appendChild(tdLabelSubtotal);
    filaSubtotal.appendChild(tdValorSubtotal);
    tablaTotales.appendChild(filaSubtotal);
    
    var filaIVA = doc.createElement('tr');
    var tdLabelIVA = doc.createElement('td');
    tdLabelIVA.textContent = 'IVA (21%):';
    tdLabelIVA.style.padding = '5px 10px';
    var tdValorIVA = doc.createElement('td');
    tdValorIVA.textContent = '$' + datos.impuestos;
    tdValorIVA.style.padding = '5px 10px';
    filaIVA.appendChild(tdLabelIVA);
    filaIVA.appendChild(tdValorIVA);
    tablaTotales.appendChild(filaIVA);
    
    var filaTotal = doc.createElement('tr');
    var tdLabelTotal = doc.createElement('td');
    tdLabelTotal.textContent = 'TOTAL:';
    tdLabelTotal.style.fontSize = '18px';
    tdLabelTotal.style.fontWeight = 'bold';
    tdLabelTotal.style.padding = '5px 10px';
    var tdValorTotal = doc.createElement('td');
    tdValorTotal.textContent = '$' + datos.total;
    tdValorTotal.style.fontSize = '18px';
    tdValorTotal.style.fontWeight = 'bold';
    tdValorTotal.style.padding = '5px 10px';
    filaTotal.appendChild(tdLabelTotal);
    filaTotal.appendChild(tdValorTotal);
    tablaTotales.appendChild(filaTotal);
    
    facturaDiv.appendChild(tablaTotales);
    
    // Agregar al body
    doc.body.appendChild(facturaDiv);
  }
  
  validarFormulario() {
    var inputs = this.querySelectorAll('input[required]');
    for (var i = 0; i < inputs.length; i++) {
      if (!inputs[i].value.trim()) {
        return false;
      }
    }
    return true;
  }
  
  obtenerDatosFormulario() {
    var datos = {
      razonSocial: this.querySelector('input[name="razonSocial"]').value,
      domicilio: this.querySelector('input[name="domicilio"]').value,
      cuit: this.querySelector('input[name="cuit"]').value,
      fechaEmision: this.querySelector('input[name="fechaEmision"]').value,
      numeroFactura: this.querySelector('input[name="numeroFactura"]').value,
      tipoFactura: this.querySelector('input[name="tipoFactura"]').value,
      subtotal: this.inputSubtotal.value,
      impuestos: this.inputImpuestos.value,
      total: this.inputTotal.value,
      items: []
    };
    
    for (var i = 0; i < this.items.length; i++) {
      var item = this.items[i];
      var itemData = {
        codigo: item.querySelector('input[name^="codigo_"]').value,
        descripcion: item.querySelector('input[name^="descripcion_"]').value,
        cantidad: item.querySelector('input[name^="cantidad_"]').value,
        precioUnitario: item.querySelector('input[name^="precio_"]').value
      };
      datos.items.push(itemData);
    }
    
    return datos;
  }
}

customElements.define('factura-afip-form', FacturaAFIPForm);

// FUNCIÓN MAIN: punto de entrada de la aplicación
function main() {
  let MiFactura = document.createElement('factura-afip-form');
  document.body.appendChild(MiFactura);
  MiFactura.montar(); // Montar el formulario después de agregarlo al DOM
}

window.onload = main;

</script>

</html>
