<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clima MDP WebComponent</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f0f0; }
        table { border-collapse: collapse; font-size: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ccc; padding: 4px; text-align: center; }
        th { background-color: #e0e0e0; font-weight: bold; }
        .header-title { background-color: #cbcbbd; font-weight: bold; }
        .row-temp { background-color: #f5d795; }
        .row-precip { background-color: #d0e0ff; }
        .row-sol { background-color: #fdff6a; }
        .row-humedad { background-color: #63abf3; }
        .col-annual { font-weight: bold; background-color: #ffff99; }
        .header-mes { background-color: #f0f0f0; }
        tr.main-header th { background-color: #c3c0c0; }

        /* Botón de conversión */
        .btn-convertir {
            margin-bottom: 12px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #555;
            border-radius: 6px;
            background-color: #fff3cd;
            color: #333;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.15);
            transition: background-color 0.2s;
        }
        .btn-convertir:hover {
            background-color: #ffe08a;
        }
    </style>
    <h2>Datos Meteorológicos Mar del Plata (1961-1990)</h2>
</head>

<body>

</body>

<!-- Instanciacion-->
<tabla-clima-mardelplata id="miTablaClima"></tabla-clima-mardelplata>

<script>
    var DATOS_CLIMA = {
        titulo: "Parámetros climáticos promedio de Mar del Plata, BA (1961–1990)",
        encabezados: ['Mes', 'Ene.', 'Feb.', 'Mar.', 'Abr.', 'May.', 'Jun.', 'Jul.', 'Ago.', 'Sep.', 'Oct.', 'Nov.', 'Dic.', 'Anual'],
        filas: [
            { label: 'Temp. máx. abs. (°C)', labelF: 'Temp. máx. abs. (°F)', tipo: 'temp', valores: [42.4, 38.1, 36.3, 32.5, 27.4, 22.2, 27.7, 24.7, 28.8, 34.4, 35.7, 39.4, 39.4] },
            { label: 'Temp. máx. media (°C)', labelF: 'Temp. máx. media (°F)', tipo: 'temp', valores: [26.3, 25.8, 23.7, 20.5, 16.8, 13.8, 13.1, 14.4, 16.0, 18.5, 21.7, 24.4, 19.6] },
            { label: 'Temp. media (°C)', labelF: 'Temp. media (°F)', tipo: 'temp', valores: [20.3, 19.9, 18.0, 14.8, 11.3, 8.5, 8.1, 8.9, 10.5, 13.1, 15.9, 18.5, 14.0] },
            { label: 'Temp. mín. media (°C)', labelF: 'Temp. mín. media (°F)', tipo: 'temp', valores: [14.3, 14.1, 12.5, 9.1, 6.4, 4.1, 3.8, 4.0, 5.3, 7.6, 10.1, 12.7, 8.7] },
            { label: 'Temp. mín. abs. (°C)', labelF: 'Temp. mín. abs. (°F)', tipo: 'temp', valores: [4.7, 1.2, 1.9, -1.0, -3.0, -5.5, -9.3, -8.4, -5.5, -3.0, -2.0, -0.2, -9.3] },
            { label: 'Precipitación total (mm)', tipo: 'precip', valores: [100.1, 72.8, 107.0, 73.3, 73.5, 54.9, 58.9, 64.0, 56.4, 83.4, 75.3, 104.0, 923.6] },
            { label: 'Días de precipitaciones (> 0.1 mm)', tipo: 'precip', valores: [9, 8, 9, 9, 9, 9, 9, 8, 7, 10, 10, 10, 107] },
            { label: 'Horas de sol', tipo: 'sol', valores: [288.3, 234.5, 232.5, 195.0, 167.4, 120.0, 127.1, 164.3, 174.0, 210.8, 222.0, 269.7, 2405.6] },
            { label: 'Humedad relativa (%)', tipo: 'humedad', valores: [76, 77, 79, 81, 83, 84, 81, 81, 80, 80, 77, 76, 80] }
        ]
    };

    // Convierte redondeado a 1 decimal
    function celsiusAFahrenheit(c) {
        return Math.round((c * 9 / 5 + 32) * 10) / 10;
    }

    class TablaClimaMdP extends HTMLElement {
        constructor() {
            super();

            // --- Estado interno ---
            this._unidad = 'C';          // Unidad actual ('C' o 'F')
            this._celdasTemp = [];       // Array de arrays: celdas TD de cada fila de temp
            this._labelsTemp = [];       // Array de TH label de cada fila de temp
            this._boton = null;          // Referencia al botón de conversión
            this._promDiv = null;        // Referencia al div de promedios

            var self = this;
            var wrapper = document.createElement('div');

            // Botón de conversión
            var btn = document.createElement('button');
            btn.className = 'btn-convertir';
            btn.textContent = 'Convertir a °F';
            self._boton = btn;
            wrapper.appendChild(btn);

            // Título
            var titulo = document.createElement('h3');
            titulo.textContent = DATOS_CLIMA.titulo;
            titulo.style.textAlign = 'center';
            wrapper.appendChild(titulo);

            // Tabla
            var table = document.createElement('table');

            // Encabezado
            var thead = document.createElement('thead');
            var trHead = document.createElement('tr');
            trHead.className = 'main-header';

            DATOS_CLIMA.encabezados.forEach(function(texto) {
                var th = document.createElement('th');
                th.textContent = texto;
                if (texto === 'Anual') th.className = 'col-annual';
                trHead.appendChild(th);
            });
            thead.appendChild(trHead);
            table.appendChild(thead);

            // Cuerpo
            var tbody = document.createElement('tbody');

            // Reiniciar referencias
            self._celdasTemp = [];
            self._labelsTemp = [];

            DATOS_CLIMA.filas.forEach(function(filaData, indice) {
                var tr = document.createElement('tr');

                // Clase de fila según tipo
                var rowClass = '';
                if (filaData.tipo === 'temp')        rowClass = 'row-temp';
                else if (filaData.tipo === 'precip') rowClass = 'row-precip';
                else if (filaData.tipo === 'sol')    rowClass = 'row-sol';
                else if (filaData.tipo === 'humedad') rowClass = 'row-humedad';
                tr.className = rowClass;

                // Label
                var thLabel = document.createElement('th');
                thLabel.textContent = filaData.label;
                thLabel.style.textAlign = 'left';
                thLabel.style.backgroundColor = 'transparent';
                tr.appendChild(thLabel);

                // Datos
                var celdasFila = [];
                filaData.valores.forEach(function(valor) {
                    var td = document.createElement('td');
                    td.textContent = valor;
                    tr.appendChild(td);
                    celdasFila.push(td);
                });

                // Guardar referencias solo para filas de temperatura
                if (filaData.tipo === 'temp') {
                    self._celdasTemp.push(celdasFila);
                    self._labelsTemp.push(thLabel);
                }

                tbody.appendChild(tr);
            });

            table.appendChild(tbody);
            wrapper.appendChild(table);

            // Div del promedio general
            var resultado = self.obtenerPromediosTemperaturas();
            var promDiv = document.createElement('div');
            promDiv.style.marginTop = '20px';
            promDiv.style.width = '675px';
            promDiv.style.padding = '10px';
            promDiv.style.border = '1px solid green';
            promDiv.style.backgroundColor = '#e0ffe0';
            promDiv.textContent = 'Promedio General de Temperaturas: ' + resultado.promedio_general + ' °C';
            self._promDiv = promDiv;
            wrapper.appendChild(promDiv);

            // Insertar todo el wrapper en el WebComponent
            self.appendChild(wrapper);
        }

        connectedCallback() {
            // Asociación del manejador del botón usando bind(this)
            this._boton.onclick = this._alternarUnidad.bind(this);
        }

        /**
         * Alterna la unidad entre °C y °F, actualizando las celdas y labels.
         */
        _alternarUnidad() {
            var self = this;

            // Filas de temperatura en DATOS_CLIMA (índices 0 a 4)
            var indicesTemp = [0, 1, 2, 3, 4];

            if (self._unidad === 'C') {
                // Convertir a °F
                indicesTemp.forEach(function(idx, posicion) {
                    var filaData = DATOS_CLIMA.filas[idx];
                    var celdas = self._celdasTemp[posicion];
                    filaData.valores.forEach(function(valC, i) {
                        celdas[i].textContent = celsiusAFahrenheit(valC);
                    });
                    self._labelsTemp[posicion].textContent = filaData.labelF;
                });
                self._unidad = 'F';
                self._boton.textContent = 'Convertir a °C';
                self._promDiv.textContent = 'Promedio General de Temperaturas: ' + celsiusAFahrenheit(parseFloat(self.obtenerPromediosTemperaturas().promedio_general)) + ' °F';
            } else {
                // Volver a °C
                indicesTemp.forEach(function(idx, posicion) {
                    var filaData = DATOS_CLIMA.filas[idx];
                    var celdas = self._celdasTemp[posicion];
                    filaData.valores.forEach(function(valC, i) {
                        celdas[i].textContent = valC;
                    });
                    self._labelsTemp[posicion].textContent = filaData.label;
                });
                self._unidad = 'C';
                self._boton.textContent = 'Convertir a °F';
                self._promDiv.textContent = 'Promedio General de Temperaturas: ' + self.obtenerPromediosTemperaturas().promedio_general + ' °C';
            }
        }

        /**
         * Obtiene el conjunto de promedios de las temperaturas anuales.
         * Devuelve el valor anual de cada fila de temperatura y el promedio general.
         */
        obtenerPromediosTemperaturas() {
            var filasTemperatura = [0, 1, 2, 3, 4];
            var sumaTotal = 0;
            var contador = 0;
            var detalle = {};

            filasTemperatura.forEach(function(indice) {
                var valorAnual = DATOS_CLIMA.filas[indice].valores[12];
                detalle[DATOS_CLIMA.filas[indice].label] = valorAnual;
                sumaTotal += valorAnual;
                contador++;
            });

            var promedioGeneral = sumaTotal / contador;

            return {
                detalle: detalle,
                promedio_general: promedioGeneral.toFixed(2)
            };
        }

        disconnectedCallback() {
            // Limpiar si fuera necesario
        }
    }

    customElements.define('tabla-clima-mardelplata', TablaClimaMdP);

    function main() {
        var componente = document.getElementById('miTablaClima');
        var resultado = componente.obtenerPromediosTemperaturas();
        console.log('Resultado del método obtenerPromediosTemperaturas:', resultado);
    }

    window.onload = main;
</script>

</html>
